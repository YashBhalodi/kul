name: VSCode Extension

# Per-PR sanity check on the extension manifest, grammar, and TypeScript
# build. The actual marketplace publish lives in `release.yml` and runs
# on `v*` tag push as part of the unified release pipeline.

on:
  push:
    branches: [main]
    paths:
      - 'editor/vscode/**'
      - '.github/workflows/vscode-extension.yml'
  pull_request:
    paths:
      - 'editor/vscode/**'
      - '.github/workflows/vscode-extension.yml'

jobs:
  lint:
    name: Lint manifest and grammar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install vsce
        run: npm install -g @vscode/vsce
      - name: Install extension dev dependencies
        working-directory: editor/vscode
        run: npm ci
      - name: Validate JSON files parse
        run: |
          set -e
          for f in $(find editor/vscode -type f -name '*.json' -not -path '*/node_modules/*'); do
            echo "validating $f"
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
          done
      - name: Validate manifest with vsce package
        working-directory: editor/vscode
        run: vsce package --no-yarn --out /tmp/kul-test.vsix
