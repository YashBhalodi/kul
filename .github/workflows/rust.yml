name: Rust

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "justfile"
      - ".github/workflows/rust.yml"
  pull_request:
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rustfmt.toml"
      - "justfile"
      - ".github/workflows/rust.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --no-tests=pass

  wasm-build:
    name: wasm-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-build
      - uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack@0.13.1
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build @kullang/wasm
        run: |
          wasm-pack build crates/kul-wasm --target bundler --out-dir pkg --out-name kul_wasm
          node -e 'const fs=require("fs"),p="crates/kul-wasm/pkg/package.json";const j=JSON.parse(fs.readFileSync(p));j.name="@kullang/wasm";fs.writeFileSync(p,JSON.stringify(j,null,2)+"\n")'
      - name: Verify package.json shape
        run: |
          set -eu
          name=$(node -p 'require("./crates/kul-wasm/pkg/package.json").name')
          version=$(node -p 'require("./crates/kul-wasm/pkg/package.json").version')
          ws_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          test "$name" = "@kullang/wasm" || { echo "::error::package name $name != @kullang/wasm"; exit 1; }
          test "$version" = "$ws_version" || { echo "::error::package version $version != workspace $ws_version"; exit 1; }
      - name: Bundle-size budget (gzipped .wasm ≤ 1 MB)
        run: |
          set -eu
          size=$(gzip -c crates/kul-wasm/pkg/kul_wasm_bg.wasm | wc -c)
          budget=$((1024 * 1024))
          echo "gzipped .wasm: $size bytes (budget: $budget)"
          if [ "$size" -gt "$budget" ]; then
            echo "::error::wasm gzip size $size exceeds budget $budget"
            exit 1
          fi
      - name: Refresh committed types and diff
        run: |
          set -eu
          cp crates/kul-wasm/pkg/kul_wasm.d.ts crates/kul-wasm/types/kul_wasm.d.ts
          git diff --exit-code -- crates/kul-wasm/types/ || {
            echo "::error::generated kul_wasm.d.ts differs from committed snapshot — run \`just wasm\` and commit the diff"
            exit 1
          }
      - name: Run Rust snapshot tests
        run: cargo test -p kul-wasm
      - name: Node smoke test
        run: node --experimental-wasm-modules crates/kul-wasm/tests/node/smoke.mjs
      - name: TypeScript compile-test
        run: npx --yes -p typescript@5.6 tsc --project crates/kul-wasm/tests/typescript/tsconfig.json
