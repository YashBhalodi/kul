name: Release

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and smoke-test only (do not publish a Release)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            can_run: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            can_run: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            # macos-latest is now ARM-based; an x86_64 binary cannot be
            # smoke-tested directly without Rosetta. Skip the runtime check.
            can_run: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            can_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build -p kula-cli --release --target ${{ matrix.target }}

      - name: Smoke test
        if: matrix.can_run
        shell: bash
        run: |
          set -e
          BIN="target/${{ matrix.target }}/release/kula"
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="$BIN.exe"; fi
          "$BIN" --version
          "$BIN" validate examples/03-three-generations.kula

      - name: Package
        id: package
        shell: bash
        run: |
          set -e
          STAGING="kula-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp README.md LICENSE CHANGELOG.md "$STAGING/" 2>/dev/null || true
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/kula.exe" "$STAGING/"
            7z a -tzip "$STAGING.zip" "$STAGING" >/dev/null
            echo "asset=$STAGING.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/kula" "$STAGING/"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            echo "asset=$STAGING.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kula-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/cli-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
