name: Release

# One workflow, one tag. Push `v<major>.<minor>.<patch>` and the pipeline
# releases the CLI, the language server, and the VSCode extension in
# lockstep. The version source of truth is the workspace `Cargo.toml`'s
# `workspace.package.version`; `editor/vscode/package.json`'s `version`
# must match. The `verify` job fails fast if either drifts from the tag.
#
# Workflow_dispatch with `dry_run = true` (default) builds + smoke-tests
# every artifact without publishing — useful for validating the pipeline
# before bumping a version.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and smoke-test only (skip GitHub Release + Open VSX publish)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify version coordination
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse and verify versions
        id: parse
        shell: bash
        run: |
          set -e
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
          else
            tag_version=""
          fi
          ws_version=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
          ext_version=$(python3 -c "import json; print(json.load(open('editor/vscode/package.json'))['version'])")
          echo "workspace: $ws_version"
          echo "extension: $ext_version"
          echo "tag:       ${tag_version:-<workflow_dispatch>}"
          if [[ "$ws_version" != "$ext_version" ]]; then
            echo "::error::workspace Cargo.toml version $ws_version != extension package.json version $ext_version"
            exit 1
          fi
          if [[ -n "$tag_version" && "$tag_version" != "$ws_version" ]]; then
            echo "::error::tag $GITHUB_REF_NAME does not match workspace/extension version $ws_version"
            exit 1
          fi
          echo "version=$ws_version" >> "$GITHUB_OUTPUT"

  build-cli:
    name: build kul-cli (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            can_run: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            can_run: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            # macos-latest is now ARM-based; skip the runtime check for the
            # x86_64 binary (would need Rosetta).
            can_run: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            can_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-release-${{ matrix.target }}
      - name: Build
        run: cargo build -p kul-cli --release --target ${{ matrix.target }}
      - name: Smoke test
        if: matrix.can_run
        shell: bash
        run: |
          set -e
          BIN="target/${{ matrix.target }}/release/kul"
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="$BIN.exe"; fi
          "$BIN" --version
          "$BIN" validate examples/03-three-generations.kul
      - name: Package
        id: package
        shell: bash
        run: |
          set -e
          STAGING="kul-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp README.md LICENSE CHANGELOG.md "$STAGING/" 2>/dev/null || true
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/kul.exe" "$STAGING/"
            7z a -tzip "$STAGING.zip" "$STAGING" >/dev/null
            echo "asset=$STAGING.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/kul" "$STAGING/"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            echo "asset=$STAGING.tar.gz" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kul-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error

  build-lsp:
    name: build kul-lsp (${{ matrix.target }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            platform_dir: linux-x64
            binary_name: kul-lsp
            can_run: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            platform_dir: darwin-arm64
            binary_name: kul-lsp
            can_run: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
            platform_dir: darwin-x64
            binary_name: kul-lsp
            can_run: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            platform_dir: win32-x64
            binary_name: kul-lsp.exe
            can_run: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: lsp-release-${{ matrix.target }}
      - name: Build
        run: cargo build -p kul-lsp --release --target ${{ matrix.target }}
      - name: Smoke test
        if: matrix.can_run
        shell: bash
        run: |
          set -e
          BIN="target/${{ matrix.target }}/release/kul-lsp"
          if [[ "${{ runner.os }}" == "Windows" ]]; then BIN="$BIN.exe"; fi
          "$BIN" --version
      - name: Package archive (for GitHub Release)
        id: package
        shell: bash
        run: |
          set -e
          STAGING="kul-lsp-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp README.md LICENSE CHANGELOG.md "$STAGING/" 2>/dev/null || true
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/kul-lsp.exe" "$STAGING/"
            7z a -tzip "$STAGING.zip" "$STAGING" >/dev/null
            echo "asset=$STAGING.zip" >> "$GITHUB_OUTPUT"
          else
            cp "target/${{ matrix.target }}/release/kul-lsp" "$STAGING/"
            tar -czf "$STAGING.tar.gz" "$STAGING"
            echo "asset=$STAGING.tar.gz" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kul-lsp-${{ matrix.target }}
          path: ${{ steps.package.outputs.asset }}
          if-no-files-found: error
      - name: Stage raw binary (for Open VSX bundling)
        shell: bash
        run: |
          set -e
          mkdir -p "raw/${{ matrix.platform_dir }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "target/${{ matrix.target }}/release/kul-lsp.exe" "raw/${{ matrix.platform_dir }}/${{ matrix.binary_name }}"
          else
            cp "target/${{ matrix.target }}/release/kul-lsp" "raw/${{ matrix.platform_dir }}/${{ matrix.binary_name }}"
            chmod +x "raw/${{ matrix.platform_dir }}/${{ matrix.binary_name }}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: kul-lsp-raw-${{ matrix.platform_dir }}
          path: raw/${{ matrix.platform_dir }}
          if-no-files-found: error

  wasm-publish:
    name: Publish @kullang/wasm
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm-publish
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.13.1"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Build @kullang/wasm
        run: |
          wasm-pack build crates/kul-wasm --target bundler --out-dir pkg --out-name kul_wasm
          node -e 'const fs=require("fs"),p="crates/kul-wasm/pkg/package.json";const j=JSON.parse(fs.readFileSync(p));j.name="@kullang/wasm";fs.writeFileSync(p,JSON.stringify(j,null,2)+"\n")'
      - name: Bundle-size budget (gzipped .wasm ≤ 1 MB)
        run: |
          set -eu
          size=$(gzip -c crates/kul-wasm/pkg/kul_wasm_bg.wasm | wc -c)
          budget=$((1024 * 1024))
          echo "gzipped .wasm: $size bytes (budget: $budget)"
          if [ "$size" -gt "$budget" ]; then
            echo "::error::wasm gzip size $size exceeds budget $budget"
            exit 1
          fi
      - name: Verify npm package.json version matches release
        run: |
          set -eu
          pkg_version=$(node -p 'require("./crates/kul-wasm/pkg/package.json").version')
          release_version="${{ needs.verify.outputs.version }}"
          echo "npm package.json: $pkg_version"
          echo "release:          $release_version"
          if [ "$pkg_version" != "$release_version" ]; then
            echo "::error::npm package.json version $pkg_version does not match release version $release_version"
            exit 1
          fi
      - name: Stage tarball
        run: |
          set -eu
          cp -r crates/kul-wasm/pkg kul-wasm
          tar -czf kul-wasm.tar.gz kul-wasm
      - uses: actions/upload-artifact@v4
        with:
          name: kul-wasm
          path: kul-wasm.tar.gz
          if-no-files-found: error
      - name: Pre-flight NPM_TOKEN check
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.dry_run == false)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is unset; cannot publish @kullang/wasm. See docs/release.md § One-time npm setup."
            exit 1
          fi
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.dry_run == false)
        working-directory: crates/kul-wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

  github-release:
    name: GitHub Release
    needs: [verify, build-cli, build-lsp, wasm-publish, openvsx-publish]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.dry_run == false)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          # Pull every artifact except the raw-binary ones (those are for
          # the openvsx-publish job's bundling step, not for the public release).
          pattern: "kul*"
          merge-multiple: false
      - name: Collect release archives
        shell: bash
        run: |
          set -e
          mkdir -p release-files
          for d in dist/kul-*; do
            case "$d" in
              dist/kul-lsp-raw-*) continue ;;
            esac
            cp "$d"/* release-files/
          done
          ls -la release-files/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.verify.outputs.version }}
          tag_name: ${{ github.ref_name }}
          files: release-files/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  openvsx-publish:
    name: Publish VSCode extension to Open VSX
    needs: [verify, build-lsp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download raw kul-lsp binaries
        uses: actions/download-artifact@v4
        with:
          path: lsp-raw
          pattern: kul-lsp-raw-*
      - name: Stage binaries into editor/vscode/server/
        shell: bash
        run: |
          set -e
          mkdir -p editor/vscode/server
          for d in lsp-raw/kul-lsp-raw-*; do
            platform="${d##*kul-lsp-raw-}"
            mv "$d" "editor/vscode/server/$platform"
            ls -la "editor/vscode/server/$platform"
          done
      - name: Install extension dependencies
        working-directory: editor/vscode
        run: npm ci
      - name: Package .vsix
        working-directory: editor/vscode
        run: npx --yes @vscode/vsce package -o "kul-${{ needs.verify.outputs.version }}.vsix"
      - uses: actions/upload-artifact@v4
        with:
          name: kul-vsix
          path: editor/vscode/kul-${{ needs.verify.outputs.version }}.vsix
          if-no-files-found: error
      - name: Pre-flight OVSX_PAT check
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.dry_run == false)
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "::error::OVSX_PAT secret is unset; cannot publish to Open VSX. See docs/release.md § One-time setup."
            exit 1
          fi
      - name: Publish to Open VSX
        if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || inputs.dry_run == false)
        working-directory: editor/vscode
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx --yes ovsx publish "kul-${{ needs.verify.outputs.version }}.vsix" -p "$OVSX_PAT"
