<title>Kul query-UX prototype — ticket #276</title>
<!-- ============================================================
  PROTOTYPE — THROWAWAY. Wayfinder ticket #276 (map #275), round 8.
  BOOKMARKED incumbent: converged plate model + docked-tag whisper.
  This round: five COMPLETELY DIFFERENT whole-UX paradigms, built
  against the taste profile from rounds 1-7 (tree-as-interface,
  position over prose, whisper density, modeless, mouse-only):
    1 Lens     — hover reads ties ambiently; click pins
    2 Radiate  — one click labels every card with its term
    3 Compass  — kin sets as spatial directions around the card
    4 Trail    — walk hop by hop; the genitive chain composes
    5 Brushes  — paint the tree with composable filter brushes
  Switch via ?ux=1..5, the floating bar, or ← → keys.
  The "kinship engine" below is a mock good only for examples/05.
  ============================================================ -->
<style>
  :root {
    --qa: #7c3aed;         /* query anchor A (violet) */
    --qb: #d97706;         /* query anchor B (amber) */
    --qr: #0d9488;         /* query result (teal) */
    --qpath: #0ea5e9;      /* resolution path glow */
    --sync: #ff2d95;       /* editor selection-sync (real preview token) */
    --ink: #1a1a1a; --muted: #667085; --line: #e4e7ec; --bg: #f8fafc;
    --panel: #ffffff; --chip: #f1f5f9; --chip-on: #ede9fe;
  }
  html, body { margin:0; padding:0; }
  #proto-root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    color: var(--ink); background: var(--bg); min-height: 100vh; box-sizing: border-box;
    display: flex; flex-direction: column; }
  #proto-root *, #proto-root *::before, #proto-root *::after { box-sizing: border-box; }

  .proto-head { display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 16px; background:#fff; border-bottom:1px solid var(--line); }
  .proto-badge { background:#fae8ff; color:#86198f; border:1px solid #f0abfc;
    font-size:11px; font-weight:700; letter-spacing:.06em; padding:3px 8px; border-radius:5px; }
  .proto-title { font-size:14px; font-weight:600; }
  .proto-title span { color:var(--muted); font-weight:400; }
  .proto-head .spacer { flex:1; }
  .sim-wrap { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .sim-wrap select { font-size:12px; padding:3px 6px; border:1px solid var(--line); border-radius:6px; background:#fff; }
  .sim-dot { width:10px; height:10px; border-radius:50%; background:var(--sync); display:inline-block; }

  .explainer { position:absolute; top:12px; left:12px; z-index:30; max-width:340px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 4px 16px rgba(16,24,40,.09); font-size:12.5px; line-height:1.45; }
  .explainer summary { cursor:pointer; padding:8px 12px; font-weight:600; font-size:12.5px; list-style:none; }
  .explainer summary::before { content:"ⓘ "; color:var(--qa); }
  .explainer[open] summary { border-bottom:1px solid var(--line); }
  .explainer .ex-body { padding:8px 12px 10px; }
  .explainer dt { font-weight:600; margin-top:6px; }
  .explainer dd { margin:1px 0 0 0; color:var(--muted); }

  .stage-row { display:flex; flex:1; min-height:0; position:relative; }
  .stage { position:relative; flex:1; overflow:auto; padding:24px 16px 90px; }
  .stage svg.kul-tree { width:100%; max-width:1250px; height:auto; display:block; margin:0 auto;
    background:#fff; border:1px solid var(--line); border-radius:8px; }

  .kul-card { cursor:pointer; }
  .kul-card.kul-selected > rect { outline:3px solid var(--sync); outline-offset:2px; }
  .kul-card.q-anchor-a > rect { outline:3px solid var(--qa); outline-offset:3px; }
  .kul-card.q-anchor-b > rect { outline:3px solid var(--qb); outline-offset:3px; }
  .kul-card.q-result > rect { outline:3px solid var(--qr); outline-offset:2px;
    filter:drop-shadow(0 0 6px rgba(13,148,136,.55)); }
  .kul-card.q-result-ghost > rect { outline:2px dashed var(--qr); outline-offset:2px; }
  .kul-card.q-path > rect { outline:2px dashed var(--qpath); outline-offset:4px; }
  .kul-card.q-dim { opacity:.22; }
  .kul-card.q-fade { opacity:.45; }
  .kul-card.q-pulse > rect { animation:qpulse .9s ease-in-out infinite alternate; }
  @keyframes qpulse { from { outline-color:var(--qr); } to { outline-color:transparent; } }

  .q-float { position:absolute; z-index:20; }
  .halo-toast { position:absolute; z-index:26; background:#0f172a; color:#f8fafc;
    padding:7px 11px; border-radius:8px; font-size:12px; max-width:300px;
    box-shadow:0 6px 20px rgba(2,6,23,.35); }
  .sync-hint { position:absolute; z-index:19; top:12px; right:12px; background:#fff7ed;
    border:1px solid #fed7aa; color:#9a3412; font-size:11.5px; padding:5px 10px; border-radius:8px; }
  .sync-hint kbd { background:#fff; border:1px solid #fed7aa; border-radius:4px; padding:0 4px; }

  /* the bookmarked docked-tag whisper */
  .whisper-pill { position:absolute; z-index:24; background:var(--panel); border:1px solid var(--line);
    border-radius:999px; padding:5px 12px; box-shadow:0 6px 20px rgba(16,24,40,.16);
    display:flex; align-items:center; gap:7px; font-size:14px; font-weight:700; white-space:nowrap; }
  .whisper-pill .tie-note { font-weight:400; font-size:12px; color:var(--muted); }
  .whisper-pill .sep { color:var(--muted); font-weight:400; }
  .whisper-pill .term { cursor:help; }
  .whisper-pill .term.gu { font-size:15.5px; }
  .dot { width:11px; height:11px; border-radius:50%; display:inline-block; flex:none; cursor:default; }
  .dot.a { background:var(--qa); box-shadow:0 0 0 2px #ede9fe; }
  .swap-mini { cursor:pointer; color:var(--muted); font-size:14px; user-select:none; border-radius:5px; padding:0 3px; }
  .swap-mini:hover { color:var(--qa); background:var(--chip-on); }

  /* radiate: tiny term tags under every card */
  .mini-tag { position:absolute; z-index:21; background:var(--panel); border:1px solid #99f6e4;
    color:#0f766e; border-radius:999px; padding:0 7px; font-size:10.5px; font-weight:600;
    box-shadow:0 2px 8px rgba(16,24,40,.12); white-space:nowrap; cursor:pointer; }
  .mini-tag.gu { font-size:12px; }
  .mini-tag:hover { border-color:var(--qr); }
  .mini-tag .plus { color:var(--muted); font-weight:400; margin-left:3px; }
  .mini-tag.hop { border-color:#fcd34d; color:#92400e; cursor:default; }

  /* compass */
  .compass { position:absolute; z-index:22; width:190px; height:190px; }
  .compass .hub { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:14px; height:14px; border-radius:50%; background:var(--qa); box-shadow:0 0 0 3px #ede9fe; }
  .compass .ring { position:absolute; inset:14px; border:1.5px dashed #d8d2f0; border-radius:50%; }
  .spoke { position:absolute; transform:translate(-50%,-50%); background:var(--panel);
    border:1px solid var(--line); border-radius:999px; padding:2px 9px; font-size:11px;
    font-weight:600; cursor:pointer; user-select:none; white-space:nowrap;
    box-shadow:0 2px 8px rgba(16,24,40,.14); }
  .spoke:hover { border-color:var(--qa); background:var(--chip-on); color:#5b21b6; }
  .spoke.on { background:var(--chip-on); border-color:var(--qa); color:#5b21b6; }
  .spoke .cnt { color:var(--muted); font-weight:400; }
  .compass-more { position:absolute; z-index:22; display:flex; gap:4px; flex-wrap:wrap; max-width:200px; }
  .compass-more .spoke { position:static; transform:none; font-size:10.5px; padding:1px 7px; }

  /* trail */
  .trail-svg { position:absolute; left:0; top:0; z-index:18; pointer-events:none; }
  .trail-svg polyline { fill:none; stroke:var(--qpath); stroke-width:2.5; stroke-dasharray:8 6;
    stroke-linejoin:round; opacity:.85; }
  .crumbs { position:absolute; z-index:25; left:50%; transform:translateX(-50%); top:12px;
    display:flex; align-items:center; gap:5px; background:var(--panel); border:1px solid var(--line);
    border-radius:999px; padding:5px 12px; box-shadow:0 6px 20px rgba(16,24,40,.14);
    font-size:12px; flex-wrap:wrap; max-width:70%; }
  .crumbs .crumb { font-weight:600; cursor:pointer; border-radius:6px; padding:0 4px; }
  .crumbs .crumb:hover { background:var(--chip-on); color:#5b21b6; }
  .crumbs .hop-term { color:#0f766e; font-weight:400; font-size:11px; }
  .crumbs .hop-term.gu { font-size:12.5px; }
  .crumbs .arr { color:var(--muted); }

  /* brushes */
  .palette { position:absolute; z-index:28; top:56px; right:12px; width:190px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px;
    box-shadow:0 6px 24px rgba(16,24,40,.14); padding:9px 11px; font-size:12px; }
  .palette .pal-title { font-weight:700; font-size:11px; letter-spacing:.05em; color:var(--muted);
    text-transform:uppercase; margin-bottom:6px; }
  .brush { display:inline-block; border:1px solid var(--line); background:var(--chip);
    border-radius:999px; padding:2px 9px; font-size:11.5px; cursor:pointer; user-select:none;
    margin:0 4px 5px 0; }
  .brush:hover { border-color:var(--qa); }
  .brush.on { background:var(--chip-on); border-color:var(--qa); color:#5b21b6; font-weight:600; }
  .brush.armed { border-style:dashed; border-color:var(--qb); color:#92400e; background:#fffbeb; }
  .brush .x { margin-left:4px; color:var(--muted); }
  .pal-count { margin-top:4px; padding-top:6px; border-top:1px solid var(--line); color:var(--muted); }
  .pal-count b { color:var(--ink); }

  .switcher { position:fixed; left:50%; transform:translateX(-50%); bottom:18px; z-index:40;
    display:flex; align-items:center; gap:10px; background:#0f172a; color:#f8fafc;
    border-radius:999px; padding:7px 12px; box-shadow:0 8px 30px rgba(2,6,23,.4);
    font-size:13px; user-select:none; }
  .switcher .arrow { cursor:pointer; font-size:15px; padding:0 6px; opacity:.85; }
  .switcher .arrow:hover { opacity:1; }
  .switcher .vlabel { min-width:200px; text-align:center; font-weight:600; }
  .switcher .vkeys { color:#94a3b8; font-weight:400; font-size:11px; }
</style>

  <div class="proto-head">
    <span class="proto-badge">PROTOTYPE · ROUND 8 · FIVE PARADIGMS</span>
    <span class="proto-title">Kinship query UX <span>— #276 · wild alternatives to the bookmarked model</span></span>
    <span class="spacer"></span>
    <span class="sim-wrap">
      Phrasing language:
      <select id="langSel">

    </span>
    <span class="sim-wrap">
      <span class="sim-dot"></span> Simulate editor cursor on:
      <select id="editorSim"><option value="">— none —</option></select>
    </span>
  </div>

  <div class="stage-row">
    <div class="stage" id="stage">
      <details class="explainer" id="explainer" open>
        <summary>This paradigm</summary>
        <div class="ex-body" id="exBody"></div>
      </details>

<script>
(function () {
  "use strict";

  /* =============== mock family data (examples/05) =============== */
  var P = {
    giuseppe: { name: "Giuseppe Rossi", g: "m", born: 1940 },
    sofia:    { name: "Sofia Rossi",    g: "f", born: 1943 },
    marco:    { name: "Marco Rossi",    g: "m", born: 1968 },
    lucia:    { name: "Lucia Rossi",    g: "f", born: 1971 },
    elena:    { name: "Elena Bianchi",  g: "f", born: 1970 },
    paolo:    { name: "Paolo Conti",    g: "m", born: 1969 },
    matteo:   { name: "Matteo Rossi",   g: "m", born: 1997 },
    giulia:   { name: "Giulia Conti",   g: "f", born: 1998 },
    aldo:     { name: "Aldo Bianchi",   g: "m", born: 1942 },
    bianca:   { name: "Bianca Bianchi", g: "f", born: 1945 }
  };
  var PARENTS = {
    marco: ["giuseppe", "sofia"], lucia: ["giuseppe", "sofia"],
    matteo: ["marco", "elena"], giulia: ["lucia", "paolo"],
    elena: ["aldo", "bianca"]
  };
  var SPOUSES = {
    giuseppe: ["sofia"], sofia: ["giuseppe"], marco: ["elena"], elena: ["marco"],
    lucia: ["paolo"], paolo: ["lucia"], matteo: ["giulia"], giulia: ["matteo"],
    aldo: ["bianca"], bianca: ["aldo"]
  };
  var GHOSTS = { elena: true, giulia: true };
  var ALL = Object.keys(P);

  function parentsOf(x) { return PARENTS[x] || []; }
  function spousesOf(x) { return SPOUSES[x] || []; }
  function childrenOf(x) {
    return ALL.filter(function (k) { return parentsOf(k).indexOf(x) >= 0; });
  }
  function siblingsOf(x) {
    var ps = parentsOf(x);
    if (!ps.length) return [];
    return childrenOf(ps[0]).filter(function (y) { return y !== x; });
  }
  function uniq(a) { return a.filter(function (v, i) { return a.indexOf(v) === i; }); }

  /* =============== mock kinship engine (unchanged since round 1) =============== */
  function ancEntries(x) {
    var out = [];
    (function walk(chain) {
      var last = chain[chain.length - 1];
      out.push({ anc: last, up: chain.length - 1, chain: chain.slice() });
      parentsOf(last).forEach(function (p) { walk(chain.concat([p])); });
    })([x]);
    return out;
  }
  function ancestorsOf(x) {
    return uniq(ancEntries(x).filter(function (e) { return e.up > 0; }).map(function (e) { return e.anc; }));
  }
  function descendantsOf(x) {
    var out = [];
    (function walk(y) {
      childrenOf(y).forEach(function (c) { if (out.indexOf(c) < 0) { out.push(c); walk(c); } });
    })(x);
    return out;
  }

  function t(en, gu, script, note) { return { en: en, gu: gu, script: script, note: note || "" }; }

  function auntUncleTerm(side, g, alterId, linkParentId) {
    if (side === "paternal" && g === "m") {
      var elder = P[alterId].born < P[linkParentId].born;
      return elder ? t("paternal uncle (father’s elder brother)", "moṭā bāpā", "મોટા બાપા")
                   : t("paternal uncle (father’s brother)", "kākā", "કાકા");
    }
    if (side === "paternal") return t("paternal aunt (father’s sister)", "foī", "ફોઈ");
    if (g === "m") return t("maternal uncle (mother’s brother)", "māmā", "મામા");
    return t("maternal aunt (mother’s sister)", "māsī", "માસી");
  }

  function bloodTerm(up, down, egoChain, alterChain) {
    var alter = alterChain[0], ag = P[alter].g;
    var side = up >= 2 ? (P[egoChain[1]].g === "m" ? "paternal" : "maternal") : null;
    if (up === 1 && down === 0) return ag === "m" ? t("father", "bāpuji", "બાપુજી") : t("mother", "bā", "બા");
    if (up === 2 && down === 0) {
      if (side === "paternal") return ag === "m" ? t("grandfather (paternal)", "dādā", "દાદા") : t("grandmother (paternal)", "dādī", "દાદી");
      return ag === "m" ? t("grandfather (maternal)", "nānā", "નાના") : t("grandmother (maternal)", "nānī", "નાની");
    }
    if (up === 0 && down === 1) return ag === "m" ? t("son", "dīkro", "દીકરો") : t("daughter", "dīkrī", "દીકરી");
    if (up === 0 && down === 2) {
      var viaSon = P[alterChain[1]].g === "m";
      if (viaSon) return ag === "m" ? t("grandson (son’s son)", "pautra", "પૌત્ર") : t("granddaughter (son’s daughter)", "pautrī", "પૌત્રી");
      return ag === "m" ? t("grandson (daughter’s son)", "dohitra", "દોહિત્ર") : t("granddaughter (daughter’s daughter)", "dohitrī", "દોહિત્રી");
    }
    if (up === 1 && down === 1) {
      var elder = P[alter].born < P[egoChain[0]].born;
      if (ag === "m") return elder ? t("elder brother", "moṭā bhāī", "મોટા ભાઈ") : t("younger brother", "nānā bhāī", "નાના ભાઈ");
      return elder ? t("elder sister", "moṭī ben", "મોટી બેન") : t("younger sister", "nānī ben", "નાની બેન");
    }
    if (up === 2 && down === 1) return auntUncleTerm(side, ag, alter, egoChain[1]);
    if (up === 1 && down === 2) {
      var viaBro = P[alterChain[1]].g === "m";
      if (viaBro) return ag === "m" ? t("nephew (brother’s son)", "bhatrījo", "ભત્રીજો") : t("niece (brother’s daughter)", "bhatrījī", "ભત્રીજી");
      return ag === "m" ? t("nephew (sister’s son)", "bhāṇej", "ભાણેજ") : t("niece (sister’s daughter)", "bhāṇī", "ભાણી");
    }
    if (up === 2 && down === 2) {
      var au = alterChain[1];
      var auT = auntUncleTerm(side, P[au].g, au, egoChain[1]);
      var suffix = ag === "m" ? ["-no dīkro", "નો દીકરો"] : ["-ni dīkrī", "ની દીકરી"];
      return t("first cousin (" + auT.en + "’s child)", auT.gu + suffix[0], auT.script + suffix[1],
        "genitive walk of the path backbone — no single lexeme");
    }
    var enG = ag === "m" ? "kinsman" : "kinswoman";
    return t("distant blood " + enG + " (up " + up + ", down " + down + ")", "dūr-nā sagā", "દૂરનાં સગાં",
      "beyond the lexicalized inventory — compositional fallback");
  }

  function bloodTies(ego, alter) {
    if (ego === alter) return [];
    var A = ancEntries(ego), B = ancEntries(alter), cands = [];
    A.forEach(function (a) {
      B.forEach(function (b) {
        if (a.anc === b.anc) cands.push({ up: a.up, down: b.up, egoChain: a.chain, alterChain: b.chain, total: a.up + b.up });
      });
    });
    if (!cands.length) return [];
    var min = Math.min.apply(null, cands.map(function (c) { return c.total; }));
    var seen = {}, ties = [];
    cands.filter(function (c) { return c.total === min; }).forEach(function (c) {
      var k = c.up + "/" + c.down;
      if (seen[k]) return;
      seen[k] = 1;
      var term = bloodTerm(c.up, c.down, c.egoChain, c.alterChain);
      var path = c.egoChain.concat(c.alterChain.slice(0, -1).reverse());
      ties.push({ en: term.en, gu: term.gu, script: term.script, note: term.note, kind: "blood", path: path });
    });
    return ties;
  }

  function affinalTies(ego, alter) {
    var ties = [];
    function push(term, path) {
      ties.push({ en: term.en, gu: term.gu, script: term.script, note: term.note, kind: "in-law", path: path });
    }
    if (spousesOf(ego).indexOf(alter) >= 0) {
      push(P[alter].g === "m" ? t("husband", "pati / var", "પતિ / વર") : t("wife", "patnī", "પત્ની"), [ego, alter]);
    }
    ALL.forEach(function (K) {
      if (K === ego || K === alter) return;
      if (spousesOf(K).indexOf(alter) < 0) return;
      bloodTies(ego, K).forEach(function (bt) {
        var shape = bt.path.length;
        var up1down1 = /brother|sister/.test(bt.en) && shape === 3;
        var term = null, ag = P[alter].g;
        if (/uncle|aunt/.test(bt.en)) {
          if (bt.gu === "foī") term = t("uncle (foī’s husband)", "fuvā", "ફુવા");
          else if (bt.gu === "māmā") term = t("aunt (māmā’s wife)", "māmī", "મામી");
          else if (bt.gu === "māsī") term = t("uncle (māsī’s husband)", "māsā", "માસા");
          else term = t("aunt (kākā’s wife)", "kākī", "કાકી");
        } else if (up1down1) {
          term = P[K].g === "m" ? t("sister-in-law (brother’s wife)", "bhābhī", "ભાભી")
                                : t("brother-in-law (sister’s husband)", "banevī", "બનેવી");
        } else if (/^son$|^daughter$/.test(bt.en)) {
          term = ag === "m" ? t("son-in-law (daughter’s husband)", "jamāī", "જમાઈ")
                            : t("daughter-in-law (son’s wife)", "vahu / putravadhū", "વહુ / પુત્રવધૂ");
        } else {
          term = t(bt.en + "’s " + (ag === "m" ? "husband" : "wife"),
                   bt.gu + (ag === "m" ? "-no var" : "-nī patnī"), bt.script + (ag === "m" ? "નો વર" : "ની પત્ની"),
                   "compositional — no single lexeme");
        }
        push(term, bt.path.concat([alter]));
      });
    });
    spousesOf(ego).forEach(function (S) {
      if (S === alter) return;
      bloodTies(S, alter).forEach(function (bt) {
        var term = null, ag = P[alter].g;
        if (bt.en === "father") term = t("father-in-law (spouse’s father)", "sasro", "સસરો");
        else if (bt.en === "mother") term = t("mother-in-law (spouse’s mother)", "sāsu", "સાસુ");
        else if (/brother|sister/.test(bt.en) && bt.path.length === 3) {
          if (P[S].g === "f") term = ag === "m" ? t("brother-in-law (wife’s brother)", "sāḷo", "સાળો")
                                                : t("sister-in-law (wife’s sister)", "sāḷī", "સાળી");
          else if (ag === "m") {
            var elder = P[alter].born < P[S].born;
            term = elder ? t("brother-in-law (husband’s elder brother)", "jeṭh", "જેઠ")
                         : t("brother-in-law (husband’s younger brother)", "diyar", "દિયર");
          } else term = t("sister-in-law (husband’s sister)", "naṇand", "નણંદ");
        } else {
          term = t("spouse’s " + bt.en, "(spouse-nā) " + bt.gu, bt.script, "compositional — no single lexeme");
        }
        push(term, [ego].concat(bt.path));
      });
    });
    childrenOf(ego).forEach(function (c) {
      spousesOf(c).forEach(function (sp) {
        if (parentsOf(sp).indexOf(alter) >= 0) {
          push(P[alter].g === "m" ? t("co-father-in-law (child’s spouse’s father)", "vevāī", "વેવાઈ")
                                  : t("co-mother-in-law (child’s spouse’s mother)", "vevāṇ", "વેવાણ"),
               [ego, c, sp, alter]);
        }
      });
    });
    return ties;
  }

  function resolvePair(ego, alter) {
    var blood = bloodTies(ego, alter);
    var affinal = affinalTies(ego, alter);
    if (blood.length) {
      affinal = affinal.filter(function (tie) { return tie.note.indexOf("compositional") < 0; });
    }
    var seen = {}, out = [];
    blood.concat(affinal).forEach(function (tie) { if (!seen[tie.gu]) { seen[tie.gu] = 1; out.push(tie); } });
    return out;
  }

  function auntsUnclesOf(x) {
    var out = [];
    parentsOf(x).forEach(function (p) {
      siblingsOf(p).forEach(function (s) {
        out.push(s);
        spousesOf(s).forEach(function (sp) { out.push(sp); });
      });
    });
    return uniq(out);
  }
  function cousinsOf(x) {
    var out = [];
    parentsOf(x).forEach(function (p) {
      siblingsOf(p).forEach(function (s) { out = out.concat(childrenOf(s)); });
    });
    return uniq(out).filter(function (y) { return y !== x; });
  }
  function niecesNephewsOf(x) {
    var out = [];
    siblingsOf(x).forEach(function (s) { out = out.concat(childrenOf(s)); });
    return uniq(out);
  }
  function inLawsOf(x) {
    var out = [];
    spousesOf(x).forEach(function (S) { out = out.concat(parentsOf(S)).concat(siblingsOf(S)); });
    siblingsOf(x).forEach(function (s) { out = out.concat(spousesOf(s)); });
    childrenOf(x).forEach(function (c) { out = out.concat(spousesOf(c)); });
    return uniq(out).filter(function (y) { return y !== x; });
  }

  var KIN_SETS = [
    { id: "parents", label: "Parents", fn: parentsOf },
    { id: "children", label: "Children", fn: childrenOf },
    { id: "siblings", label: "Siblings", fn: siblingsOf },
    { id: "spouses", label: "Spouses", fn: spousesOf },
    { id: "ancestors", label: "Ancestors", fn: ancestorsOf },
    { id: "descendants", label: "Descendants", fn: descendantsOf },
    { id: "auntsUncles", label: "Aunts & uncles", fn: auntsUnclesOf },
    { id: "niecesNephews", label: "Nieces & nephews", fn: niecesNephewsOf },
    { id: "cousins", label: "Cousins", fn: cousinsOf },
    { id: "inLaws", label: "In-laws", fn: inLawsOf },
    { id: "stepParents", label: "Step-parents", fn: function () { return []; } },
    { id: "stepSiblings", label: "Step-siblings", fn: function () { return []; } },
    { id: "stepChildren", label: "Step-children", fn: function () { return []; } }
  ];
  function setById(id) { return KIN_SETS.filter(function (s) { return s.id === id; })[0]; }

  /* =============== DOM + paint helpers =============== */
  var stage = document.getElementById("stage");
  var svg = stage.querySelector("svg");
  svg.classList.add("kul-tree");
  var PAINT = ["q-anchor-a", "q-anchor-b", "q-result", "q-result-ghost", "q-path", "q-dim", "q-fade", "q-pulse"];

  function cardsFor(id, kind) {
    var sel = '.kul-card[data-person-id="' + id + '"]';
    if (kind) sel += '[data-kind="' + kind + '"]';
    return Array.prototype.slice.call(svg.querySelectorAll(sel));
  }
  function allCards() {
    return Array.prototype.slice.call(svg.querySelectorAll(".kul-card[data-person-id]"));
  }
  function clearPaint() {
    allCards().forEach(function (c) { PAINT.forEach(function (k) { c.classList.remove(k); }); });
  }
  function addClass(id, cls, kind) { cardsFor(id, kind).forEach(function (c) { c.classList.add(cls); }); }
  function rmClass(id, cls) { cardsFor(id).forEach(function (c) { c.classList.remove(cls); }); }
  function dimAllExcept(keep, cls) {
    allCards().forEach(function (c) {
      if (keep.indexOf(c.getAttribute("data-person-id")) < 0) c.classList.add(cls || "q-dim");
    });
  }
  function paintResults(anchorIds, resultIds) {
    clearPaint();
    anchorIds.forEach(function (a, i) { addClass(a, i === 0 ? "q-anchor-a" : "q-anchor-b", "canonical"); });
    resultIds.forEach(function (r) {
      addClass(r, "q-result", "canonical");
      if (GHOSTS[r]) addClass(r, "q-result-ghost", "ghost");
    });
    dimAllExcept(anchorIds.concat(resultIds));
    applyEditorSim();
  }
  function pathMids(a, b, ties) {
    var mid = [];
    ties.forEach(function (tie) {
      tie.path.forEach(function (pid) { if (pid !== a && pid !== b && mid.indexOf(pid) < 0) mid.push(pid); });
    });
    return mid;
  }
  function paintResolution(a, b, ties) {
    clearPaint();
    addClass(a, "q-anchor-a", "canonical");
    addClass(b, "q-anchor-b", "canonical");
    var mid = pathMids(a, b, ties);
    mid.forEach(function (m) { addClass(m, "q-path", "canonical"); });
    dimAllExcept([a, b].concat(mid));
    applyEditorSim();
  }
  function cardRect(id) {
    var el = cardsFor(id, "canonical")[0] || cardsFor(id)[0];
    if (!el) return null;
    var r = el.getBoundingClientRect(), s = stage.getBoundingClientRect();
    return { left: r.left - s.left + stage.scrollLeft, top: r.top - s.top + stage.scrollTop, width: r.width, height: r.height };
  }
  function cardCenter(id) {
    var r = cardRect(id);
    return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
  }
  function firstName(id) { return P[id].name.split(" ")[0]; }

    if (hoverBadge) { hoverBadge.remove(); hoverBadge = null; }
    if (!entering) return;
    var el = document.createElement("div");
    el.className = "mini-tag q-float";
    el.textContent = "⚭ related?";
    el.style.cursor = "pointer";
    stage.appendChild(el);
    var r = cardRect(id);
    place(el, r.left + r.width - 14, r.top - 12);
    el.addEventListener("click", function (ev) {
      ev.stopPropagation();
      var ties = resolvePair(compass.anchor, id);
      paintResolution(compass.anchor, id, ties);
      whisperAt(compass.anchor, id, ties, null);
    });
    hoverBadge = el;
  }

  /* =============== wire the SVG =============== */
  allCards().forEach(function (card) {
    card.addEventListener("click", function (ev) {
      var id = card.getAttribute("data-person-id");
      if (current().onCardClick) current().onCardClick(id, ev);
      ev.stopPropagation();
    });
    card.addEventListener("mouseenter", function () {
      var id = card.getAttribute("data-person-id");
      if (current().onCardHover) current().onCardHover(id, true);
      maybeBadge(card, true);
    });
    card.addEventListener("mouseleave", function () {
      var id = card.getAttribute("data-person-id");
      if (current().onCardHover) current().onCardHover(id, false);
    });
  });
  svg.addEventListener("click", function () { current().clear(); });

  /* =============== boot =============== */
  var initial = "1";
  try { initial = new URL(window.location.href).searchParams.get("ux") || "1"; } catch (e) {}
  var idx = { 1: 0, 2: 1, 3: 2, 4: 3, 5: 4 }[String(initial)];
  vIndex = 0;
  setMode(idx === undefined ? 0 : idx, false);
})();
</script>
